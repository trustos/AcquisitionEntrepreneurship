name: Validate reports
on:
  push:
    paths: ['deals/**/record.json', 'acquisition-evaluator/**']
  pull_request:
    paths: ['deals/**/record.json', 'acquisition-evaluator/**']

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install jsonschema
      - name: Validate every record against the schema + scorer
        run: python acquisition-evaluator/scripts/validate_reports.py --dir deals
